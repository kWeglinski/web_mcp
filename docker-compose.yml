version: '3.8'

services:
  web-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-mcp-server
    ports:
      - "8000:8000"
    environment:
      - WEB_MCP_SERVER_HOST=0.0.0.0
      - WEB_MCP_SERVER_PORT=8000
      # SearXNG configuration (optional)
      - WEB_MCP_SEARXNG_URL=http://searxng:8080
      # Admin mode (uncomment to enable)
      # - WEB_MCP_ADMIN_ENABLED=true
      # - WEB_MCP_ADMIN_API_KEY=your-secure-password
    volumes:
      - mcp-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mcp-data:

  # Optional: SearXNG service (uncomment to enable)
  # searxng:
  #   image: searxng/searxng:latest
  #   container_name: searxng
  #   ports:
  #     - "8080:8080"
